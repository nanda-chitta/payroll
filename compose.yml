services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: payroll_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d payroll_dev"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:8-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    command: ./bin/rails server -b 0.0.0.0 -p 3000
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      REDIS_URL: redis://redis:6379/1
      DEV_DOMAIN: http://localhost,http://localhost:3000,http://localhost:4000,http://localhost:5173
      PROD_DOMAIN: https://localhost
      ELASTICSEARCH_URL: http://elasticsearch:9200
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent http://127.0.0.1:3000/up >/dev/null || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    ports:
      - "3000:3000"
    volumes:
      - .:/rails
      - bundle_cache:/usr/local/bundle

  frontend:
    image: node:22-bookworm-slim
    working_dir: /app
    command: sh -lc "npm install && npm run dev -- --host 0.0.0.0 --port 4000"
    depends_on:
      web:
        condition: service_healthy
    environment:
      VITE_PROXY_TARGET: http://web:3000
    ports:
      - "4000:4000"
    volumes:
      - ./payroll-web:/app
      - frontend_node_modules:/app/node_modules

volumes:
  postgres_data:
  redis_data:
  bundle_cache:
  frontend_node_modules:
